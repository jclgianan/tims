<div class="modal fade" id="addInventoryModal" tabindex="-1" aria-labelledby="addInventoryModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addInventoryModalLabel">Add New Inventory Item</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <form action="{% url 'inventory_create' %}" method="POST">
        {% csrf_token %}
        <div class="modal-body">
          <h6 class="fw-bold mb-3 text-primary">Device Identification</h6>
          <div class="row mb-3">
            <div class="col-md-8">
              <label for="inventory_id" class="form-label">Inventory ID <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="text" class="form-control" id="inventory_id" name="inventory_id" placeholder="Auto-generated" readonly required />
                <button type="button" class="btn btn-secondary" id="generateInventoryId"><i class="fa fa-sync"></i> Generate</button>
              </div>
            </div>
            <div class="col-md-4">
              <label for="quantity" class="form-label">Quantity <span class="text-danger">*</span></label>
              <input type="number" class="form-control" id="quantity" name="quantity" value="1" min="1" required />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="device_name" class="form-label">Device Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="device_name" name="device_name" placeholder="e.g., Dell XPS 15" required />
            </div>
            <div class="col-md-6">
              <label for="category" class="form-label">Category <span class="text-danger">*</span></label>
              <select class="form-select" id="category" name="category" required>
                <option value="">Select Category</option>
                <option value="Computer System">Computer System</option>
                <option value="Components">Components</option>
                <option value="Peripherals">Peripherals</option>
                <option value="Networking">Networking</option>
                <option value="Cables & Adapters">Cables & Adapters</option>
                <option value="Others">Others</option>
              </select>
            </div>
          </div>

          <hr />

          <h6 class="fw-bold mb-3 text-primary">Specifications (Optional)</h6>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Processor</label>
              <input type="text" class="form-control" name="processor" placeholder="e.g., Intel i7" />
            </div>
            <div class="col-md-6">
              <label class="form-label">RAM</label>
              <input type="text" class="form-control" name="ram" placeholder="e.g., 16GB" />
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Storage</label>
              <input type="text" class="form-control" name="storage" placeholder="e.g., 512GB SSD" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Graphics Card</label>
              <input type="text" class="form-control" name="graphics_card" />
            </div>
          </div>

          <hr />

          <h6 class="fw-bold mb-3 text-primary">Status & Assignment</h6>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Status</label>
              <select class="form-select" name="status">
                <option value="available">Available</option>
                <option value="issued">Issued</option>
                <option value="unusable">Unusable</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Condition</label>
              <select class="form-select" name="condition">
                <option value="new">New</option>
                <option value="good">Good</option>
                <option value="fair">Fair</option>
                <option value="poor">Poor</option>
              </select>
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Issued To</label>
              <input type="text" class="form-control" name="issued_to" placeholder="Employee Name" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Office/Location</label>
              <input type="text" class="form-control" name="office" />
            </div>
          </div>

          <hr />

          <h6 class="fw-bold mb-3 text-primary">Additional Details</h6>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Date Acquired</label>
              <input type="date" class="form-control" name="date_acquired" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Date Issued</label>
              <input type="date" class="form-control" name="date_issued" />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" name="notes" rows="2"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Device</button>
        </div>
      </form>
    </div>
  </div>
</div>
