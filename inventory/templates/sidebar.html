{% load static %}
<aside class="shop_sidebar bg-light border-end vh-100" style="width: 250px;">
  <nav class="shop_nav-menu p-4">
    <ul class="nav flex-column gap-3">
      <li class="nav-item">
        <a href="{% url 'dashboard' %}" class="nav-link d-flex align-items-center gap-3 p-3 rounded fs-5 {% if request.resolver_match.url_name == 'dashboard' %} bg-primary text-white shadow-sm {% else %} text-dark hover-bg-light {% endif %}">
          <span class="menu_icon"><i class="fa-solid fa-house"></i></span>
          <span class="menu_text fw-medium">Dashboard</span>
        </a>
      </li>

      <li class="nav-item mt-2">
        <div class="nav-link d-flex align-items-center gap-3 text-dark text-uppercase fw-black small mb-2" style="letter-spacing: 1px; font-weight: 900;">
          <i class="fa-solid fa-ticket"></i>
          <span>Tickets</span>
        </div>

        <ul class="nav flex-column ms-4 border-start border-dark ps-3 gap-2">
          <li>
            <a href="#" class="nav-link p-2 text-dark fs-6 hover-text-primary {% if request.resolver_match.url_name == 'printing' %} fw-bold text-primary {% endif %}"><i class="fa-solid fa-print me-2"></i>Printing</a>
          </li>
          <li>
            <a href="#" class="nav-link p-2 text-dark fs-6 hover-text-primary {% if request.resolver_match.url_name == 'repair' %} fw-bold text-primary {% endif %}"><i class="fa-solid fa-tools me-2"></i>Repair</a>
          </li>
        </ul>
      </li>

      <li class="nav-item mt-2">
        <div class="nav-link d-flex align-items-center gap-3 text-dark text-uppercase fw-black small mb-2" style="letter-spacing: 1px; font-weight: 900;">
          <i class="fa-solid fa-boxes-stacked"></i>
          <span>Inventory</span>
        </div>

        <ul class="nav flex-column ms-4 border-start border-dark ps-3 gap-2">
          <li>
            <a href="{% url 'inventory_list' %}" class="nav-link p-2 text-dark fs-6 hover-text-primary {% if request.resolver_match.url_name == 'inventory_list' %} fw-bold text-primary {% endif %}"><i class="fa-solid fa-list-check me-2"></i>Inventory Items</a>
          </li>
          <li>
            <a href="#" class="nav-link p-2 text-dark fs-6 hover-text-primary {% if request.resolver_match.url_name == 'persons_list' %} fw-bold text-primary {% endif %}"><i class="fa-solid fa-users me-2"></i>Persons</a>
          </li>
          <li>
            <a href="{% url 'inventory_type' %}" class="nav-link p-2 text-dark fs-6 hover-text-primary {% if request.resolver_match.url_name == 'inventory_type' %} fw-bold text-primary {% endif %}"><i class="fa-solid fa-tags me-2"></i>Inventory Types</a>
          </li>
        </ul>
      </li>

      <li class="nav-item mt-auto pt-4 border-top">
        <form method="POST" action="/logout/" id="logout-form" onsubmit="return confirmLogout(event)">
          {% csrf_token %}
          <button type="submit" class="nav-link d-flex align-items-center gap-3 p-3 text-danger border-0 bg-transparent w-100 text-start fs-5 hover-bg-danger-light">
            <span class="menu_icon"><i class="fa-solid fa-right-from-bracket"></i></span>
            <span class="menu_text fw-medium">Logout</span>
          </button>
        </form>
      </li>
    </ul>
  </nav>
</aside>
