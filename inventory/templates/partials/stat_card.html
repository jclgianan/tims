<div class="col-md-4 col-6">
  <a href="{% url 'stat-cards-filter' %}?filter={{ filter_val }}" class="text-decoration-none">
    <div class="p-3 border rounded bg-light hover-shadow transition">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <small class="text-muted d-block">{{ label }}</small>
          <h4 class="fw-bold mb-0 text-dark" id="{{ id }}">{{ value }}</h4>
        </div>
        <i class="fa-solid {{ icon }} fs-4 text-{{ color }} opacity-50"></i>
      </div>
    </div>
  </a>
</div>
